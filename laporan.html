<!DOCTYPE html>
<html>
<head>
<title>Laporan Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#1e3a8a;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
font-weight:700;
margin-bottom:10px;
}

/* STYLE LAPORAN */
.laporan-card{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.laporan-header{
font-size:18px;
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
}

.laporan-tanggal{
display:inline-block;
background:#e0edff;
color:#1e3a8a;
padding:4px 10px;
border-radius:8px;
font-size:16px;
font-weight:700;
margin-bottom:8px;
}

.laporan-items{
margin-top:6px;
line-height:1.5;
font-weight:600;
}

img{
width:100%;
border-radius:10px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<button onclick="location.href='index.html'">⬅️ Kembali ke Input</button>

<h2>Laporan</h2>

<div id="listLaporan">Loading...</div>

</div>
</div>

<script>

// FORMAT TANGGAL (HARI + TANGGAL + JAM)
function formatTanggal(waktu){
let date = new Date(waktu);

let hari = date.toLocaleDateString("id-ID",{weekday:"long"});
let tanggal = date.toLocaleDateString("id-ID",{day:"numeric", month:"long", year:"numeric"});
let jam = date.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});

return `${hari}, ${tanggal} - ${jam}`;
}

// LOAD DATA
function loadLaporan(){

let list=document.getElementById("listLaporan");

db.ref("jajan").limitToLast(50).on("value",snap=>{

list.innerHTML="";

if(!snap.val()){
list.innerHTML="Belum ada data";
return;
}

let arr=Object.values(snap.val()).reverse();

arr.forEach(d=>{

let items=(d.items||[]).map(i=>{
return `${i.barang} (${i.jumlah})`;
}).join("<br>");

let div=document.createElement("div");
div.className="laporan-card";

div.innerHTML=`
<div class="laporan-header">${d.jenis} - ${d.tempat}</div>
<div class="laporan-tanggal">${formatTanggal(d.waktu)}</div>
<div class="laporan-items">${items}</div>

${d.catatan ? `
<div style="margin-top:8px;font-weight:700;color:#dc2626">
Catatan: ${d.catatan}
</div>` : ""}

${d.foto ? `<img src="${d.foto}">` : ""}
`;

list.appendChild(div);

});

});

}

</script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db=firebase.database();

// LOAD SAAT HALAMAN DIBUKA
window.onload = loadLaporan;
</script>

</body>
</html>
