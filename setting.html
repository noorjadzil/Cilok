<!DOCTYPE html>
<html>
<head>
<title>Setting Item</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
.input-group{
display:flex;
gap:8px;
margin-bottom:10px;
}

.input-group input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #cbd5f5;
font-size:15px;
}

.input-group button{
width:50px;
border-radius:10px;
background:#1e3a8a;
color:white;
font-size:20px;
font-weight:700;
}
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* 🔥 HEADER FIXED */
.header{
position:sticky;
top:0;
background:white;
padding-bottom:10px;
z-index:10;
}

h2{
text-align:center;
color:#1e3a8a;
margin:5px 0 10px;
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #cbd5f5;
margin-bottom:10px;
font-size:16px;
}

/* BUTTON */
button{
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

.btn{
width:100%;
padding:14px;
font-size:16px;
}

.btn-tambah{
background:#1e3a8a;
color:white;
}

.btn-undo{
background:#10b981;
color:white;
margin-top:10px;
}

.btn-back{
background:#64748b;
color:white;
margin-top:10px;
}

/* ITEM LIST */
.row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:12px 0;
}

.row span{
font-weight:700;
font-size:15px;
}

/* BUTTON GROUP */
.btn-group{
display:flex;
gap:8px;
}

.btn-edit{
background:#facc15;
padding:10px;
}

.btn-hapus{
background:#ef4444;
color:white;
padding:10px;
}

/* 🔥 biar tombol gede di HP */
.btn-edit, .btn-hapus{
min-width:45px;
font-size:16px;
}

/* EMPTY */
.empty{
text-align:center;
color:#64748b;
margin-top:10px;
font-weight:600;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
<h2>⚙️ Setting Item</h2>

<div class="input-group">
<input type="text" id="namaItem" placeholder="Tambah item...">
<button class="btn-tambah" onclick="tambahItem()">+</button>
</div>

<div id="listItem"></div>

<button class="btn btn-undo" onclick="undo()">↩️ Undo Hapus</button>
<button class="btn btn-back" onclick="kembali()">⬅️ Kembali ke Input</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = firebase.database();
let lastDeleted = null;

// 🔥 LOAD
function loadItems(){

let list = document.getElementById("listItem");
list.innerHTML = "Loading...";

db.ref("items").on("value",snap=>{

list.innerHTML = "";

if(!snap.exists()){
list.innerHTML = "<div class='empty'>Belum ada item</div>";
return;
}

snap.forEach(c=>{

let key = c.key;
let nama = c.val();

let div = document.createElement("div");
div.className = "row";

div.innerHTML = `
<span>${nama}</span>

<div class="btn-group">
<button class="btn-edit" onclick="editItem('${key}','${nama}')">✏️</button>
<button class="btn-hapus" onclick="hapusItem('${key}')">🗑️</button>
</div>
`;

list.appendChild(div);

});

});
}

// 🔥 TAMBAH
function tambahItem(){

let input = document.getElementById("namaItem");
let nama = input.value.trim();

if(!nama){
alert("Isi nama item dulu");
return;
}

db.ref("items").push(nama);
input.value = "";

}

// 🔥 HAPUS
function hapusItem(key){

db.ref("items/"+key).once("value").then(snap=>{

let nama = snap.val();

if(!confirm("Hapus '"+nama+"' ?")) return;

lastDeleted = {
key:key,
value:nama
};

db.ref("items/"+key).remove();

});

}

// 🔥 EDIT
function editItem(key,namaLama){

let baru = prompt("Edit nama item:", namaLama);

if(!baru) return;

db.ref("items/"+key).set(baru);

}

// 🔥 UNDO
function undo(){

if(!lastDeleted){
alert("Tidak ada yang bisa di-undo");
return;
}

db.ref("items/"+lastDeleted.key).set(lastDeleted.value);

lastDeleted = null;

alert("Dikembalikan 👍");

}

// 🔥 KEMBALI (LEBIH AMAN)
function kembali(){
window.location.href = "index.html";
}

// INIT
window.onload = loadItems;
</script>

</body>
</html>
