<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}
.container{max-width:420px;margin:auto;padding:10px;}
.card{background:white;border-radius:16px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.tabs{display:flex;background:#1e3a8a;border-radius:12px 12px 0 0;overflow:hidden;margin-bottom:10px;}
.tab-btn{flex:1;padding:12px;border:none;background:transparent;color:white;font-weight:700;}
.tab-btn.active{background:#3b82f6;}
h2{text-align:center;color:#1e3a8a;}
.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:8px 0;}
.row input{width:80px;}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#1e3a8a;color:white;font-weight:700;margin-top:15px;}
img{width:100%;border-radius:10px;margin-top:8px;}
.laporan-card{background:white;margin-top:12px;padding:12px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showTab('input',event)">Input</button>
<button class="tab-btn" onclick="showTab('laporan',event)">Laporan</button>
</div>

<div class="card">

<div id="inputTab">
<h2>Input Jajan</h2>

<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="row"><span>Tahu</span><input type="number" id="tahu"></div>
<div class="row"><span>Batagor</span><input type="number" id="batagor"></div>
<div class="row"><span>Cilok</span><input type="number" id="cilok"></div>
<div class="row"><span>Cimol</span><input type="number" id="cimol"></div>
<div class="row"><span>Cireng</span><input type="number" id="cireng"></div>
<div class="row"><span>Kripik Pangsit</span><input type="number" id="kripik_pangsit"></div>
<div class="row"><span>Piscok</span><input type="number" id="piscok"></div>
<div class="row"><span>Dimsum</span><input type="number" id="dimsum"></div>
<div class="row"><span>Maklor</span><input type="number" id="maklor"></div>
<div class="row"><span>Kebab</span><input type="number" id="kebab"></div>

<button onclick="kirim()">Simpan</button>
</div>

<div id="laporanTab" style="display:none">
<h2>Laporan</h2>
<div id="listLaporan">Loading...</div>
</div>

</div>
</div>

<script>

function showTab(tab,e){
document.getElementById("inputTab").style.display = tab==="input"?"block":"none";
document.getElementById("laporanTab").style.display = tab==="laporan"?"block":"none";
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
if(tab==="laporan") loadLaporan();
}

function formatTanggal(w){
let d=new Date(w);
return d.toLocaleString("id-ID");
}

async function kirim(){

let items=[];

function ambil(nama,id){
let v=parseInt(document.getElementById(id).value)||0;
if(v>0) items.push({barang:nama,jumlah:v});
}

let tahu=parseInt(tahu.value)||0;
let batagor=parseInt(batagor.value)||0;

if(tahu+batagor>0){
items.push({
barang:"Tahu Batagor",
jumlah:tahu+batagor,
detail:{tahu,batagor}
});
}

let cimol=parseInt(cimol.value)||0;
let cireng=parseInt(cireng.value)||0;

if(cimol+cireng>0){
items.push({
barang:"Cimol Cireng",
jumlah:cimol+cireng,
detail:{cimol,cireng}
});
}

ambil("Cilok","cilok");
ambil("Kripik Pangsit","kripik_pangsit");
ambil("Piscok","piscok");
ambil("Dimsum","dimsum");
ambil("Maklor","maklor");
ambil("Kebab","kebab");

let data={
waktu:new Date().toISOString(),
tempat:tempat.value,
jenis:jenis.value,
items:items
};

await db.ref("jajan").push(data);
alert("Tersimpan");
location.reload();
}

function loadLaporan(){

let list=document.getElementById("listLaporan");

db.ref("jajan").limitToLast(50).once("value",snap=>{

list.innerHTML="";

let data=snap.val();
if(!data){list.innerHTML="Kosong";return;}

Object.values(data).reverse().forEach(d=>{

let isi=(d.items||[]).map(i=>{
if(i.detail && i.barang==="Tahu Batagor"){
return `Tahu(${i.detail.tahu}) Batagor(${i.detail.batagor})`;
}
if(i.detail && i.barang==="Cimol Cireng"){
return `Cimol(${i.detail.cimol}) Cireng(${i.detail.cireng})`;
}
return `${i.barang} (${i.jumlah})`;
}).join("<br>");

let div=document.createElement("div");
div.className="laporan-card";
div.innerHTML=`
<b>${d.jenis} - ${d.tempat}</b><br>
${formatTanggal(d.waktu)}<br><br>
${isi}
`;

list.appendChild(div);

});

});
}

</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
databaseURL:"https://maqshof-d5772-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();
</script>

</body>
</html>
