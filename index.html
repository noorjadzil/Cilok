<!DOCTYPE html>
<html>
<head>
<title>Input Jajan</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>
body{
font-family:'Segoe UI',Arial;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.card{
background:white;
border-radius:16px;
padding:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.tabs{
display:flex;
background:#1e3a8a;
border-radius:12px 12px 0 0;
overflow:hidden;
margin-bottom:10px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:transparent;
color:white;
font-weight:700;
}

.tab-btn.active{
background:#3b82f6;
}

h2{
text-align:center;
color:#1e3a8a;
}

label{
font-weight:700;
font-size:13px;
margin-top:8px;
display:block;
}

select,input[type="number"]{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #cbd5f5;
margin-bottom:10px;
font-weight:600;
}

input[type="number"]{
text-align:center;
font-size:16px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #eee;
padding:8px 0;
}

.row input{
width:80px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e3a8a;
color:white;
font-weight:700;
margin-top:15px;
}

img{
width:100%;
border-radius:10px;
margin-top:8px;
}

#catatan{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #cbd5f5;
font-size:15px;
font-weight:600;
box-sizing:border-box;
resize:none;
}

#catatan:focus{
outline:none;
border:2px solid #1e3a8a;
}

/* LAPORAN */
.laporan-card{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.laporan-header{
font-size:18px;
font-weight:700;
color:#1e3a8a;
margin-bottom:6px;
}

.laporan-tanggal{
display:inline-block;
background:#e0edff;
color:#1e3a8a;
padding:4px 10px;
border-radius:8px;
font-size:16px;
font-weight:700;
margin-bottom:8px;
}

.laporan-items{
margin-top:6px;
line-height:1.5;
font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showTab('input',event)">Input</button>
<button class="tab-btn" onclick="showTab('laporan',event)">Laporan</button>
</div>

<div class="card">

<div id="inputTab">

<h2>Input Jajan</h2>

<label>Jenis</label>
<select id="jenis">
<option value="Masuk">Jajan Masuk</option>
<option value="Sisa">Jajan Sisa</option>
</select>

<label>Tempat</label>
<select id="tempat">
<option>Ikhwan</option>
<option>Akhwat</option>
</select>

<div class="row"><span>Tahu Batagor</span><input type="number" id="tahu_batagor"></div>
<div class="row"><span>Cilok</span><input type="number" id="cilok"></div>
<div class="row"><span>Cimol Cireng</span><input type="number" id="cimol_cireng"></div>

<label>Catatan</label>
<textarea id="catatan"></textarea>

<button id="tombol" onclick="kirim()">Simpan</button>

</div>

<div id="laporanTab" style="display:none">
<h2>Laporan</h2>
<div id="listLaporan">Loading...</div>
</div>

</div>
</div>

<script>
function showTab(tab,e){
document.getElementById("inputTab").style.display = tab==="input"?"block":"none";
document.getElementById("laporanTab").style.display = tab==="laporan"?"block":"none";
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
if(tab==="laporan") loadLaporan();
}

function formatTanggal(waktu){
let date = new Date(waktu);
return date.toLocaleString("id-ID");
}

async function kirim(){

let tombol=document.getElementById("tombol");
tombol.disabled=true;
tombol.innerText="Mengirim...";

let tempat=document.getElementById("tempat").value;
let jenis=document.getElementById("jenis").value;
let catatan=document.getElementById("catatan").value;

let items=[];

function add(nama,id){
let val=document.getElementById(id).value;
if(val && val!=0){
items.push({barang:nama,jumlah:val});
}
}

add("Tahu Batagor","tahu_batagor");
add("Cilok","cilok");
add("Cimol Cireng","cimol_cireng");

let data={
waktu:new Date().toISOString(),
tempat,jenis,items,catatan
};

await db.ref("jajan").push(data);

// ================= WA =================
let pesan=`📊 *LAPORAN JAJAN*\n\n`;
pesan+=`📍 ${tempat}\n📦 ${jenis}\n🕒 ${formatTanggal(new Date())}\n\n`;

items.forEach(i=>{
pesan+=`• ${i.barang} (${i.jumlah})\n`;
});

if(catatan){
pesan+=`\n📝 ${catatan}`;
}

let noWA="6285733162871"; // GANTI NOMOR
let url="https://wa.me/"+noWA+"?text="+encodeURIComponent(pesan);

window.open(url,"_blank");
// =====================================

alert("Berhasil & buka WA");

document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("catatan").value="";

tombol.disabled=false;
tombol.innerText="Simpan";
}

function loadLaporan(){
let list=document.getElementById("listLaporan");
list.innerHTML="Loading...";

db.ref("jajan").limitToLast(20).once("value",snap=>{
list.innerHTML="";
let arr=Object.values(snap.val()||{}).reverse();

arr.forEach(d=>{
let div=document.createElement("div");
div.className="laporan-card";

let items=(d.items||[]).map(i=>`• ${i.barang} (${i.jumlah})`).join("<br>");

div.innerHTML=`
<div class="laporan-header">${d.jenis} - ${d.tempat}</div>
<div class="laporan-tanggal">${formatTanggal(d.waktu)}</div>
<div class="laporan-items">${items}</div>
`;

list.appendChild(div);
});
});
}
</script>

</body>
</html>
